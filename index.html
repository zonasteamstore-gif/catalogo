<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZonaSteam — Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #080c14;
      --surface: #0d1220;
      --surf2:   #111827;
      --border:  #1e2d45;
      --accent:  #00c8ff;
      --accent2: #0066ff;
      --text:    #c9d6e8;
      --dim:     #4a5a72;
      --mute:    #2a3a52;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,102,255,.08) 0%,transparent 70%),
        radial-gradient(ellipse 50% 30% at 90% 80%,rgba(0,200,255,.04) 0%,transparent 60%);
    }

    /* HEADER */
    header{position:relative;z-index:10;padding:48px 24px 36px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(0,102,255,.06) 0%,transparent 100%)}
    .logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:6px}
    .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 24px rgba(0,200,255,.3)}
    h1{font-family:'Rajdhani',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .tagline{color:var(--dim);font-size:.82rem;letter-spacing:2px;text-transform:uppercase;margin-top:4px}

    /* SEARCH */
    .search-wrap{position:relative;z-index:10;max-width:640px;margin:32px auto 0;padding:0 20px}
    .search-box{position:relative}
    .search-box svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}
    #buscador{width:100%;padding:14px 48px 14px 50px;background:var(--surf2);border:1px solid var(--border);border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s}
    #buscador:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,200,255,.1)}
    #buscador::placeholder{color:var(--dim)}
    #clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:1.1rem;padding:4px;display:none;line-height:1;transition:color .2s}
    #clear-btn:hover{color:var(--accent)}
    .search-hint{text-align:center;color:var(--mute);font-size:.76rem;margin-top:10px;letter-spacing:.5px;min-height:1.2em}
    .search-hint.found{color:var(--accent)}

    /* FILTERS */
    .filters{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;gap:10px;padding:20px 20px 0;flex-wrap:wrap}
    .filter-btn{padding:6px 16px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Inter',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;letter-spacing:.5px}
    .filter-btn:hover{border-color:var(--accent);color:var(--accent)}
    .filter-btn.active{background:rgba(0,200,255,.1);border-color:var(--accent);color:var(--accent)}

    /* COUNTER */
    .counter{position:relative;z-index:10;text-align:center;color:var(--dim);font-size:.78rem;padding:16px 20px 0;letter-spacing:.5px;min-height:2em}
    .counter span{color:var(--accent);font-weight:500}

    /* GRID */
    .grid-wrap{position:relative;z-index:10;max-width:1400px;margin:24px auto 0;padding:0 20px 60px}
    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:16px}

    /* CARD */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s;animation:fadeIn .3s ease both}
    .card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
    .card.disponible:hover{border-color:rgba(0,200,255,.4)}
    .card.no-disp:hover{border-color:rgba(255,58,58,.3)}
    .card-img{position:relative;aspect-ratio:460/215;overflow:hidden;background:var(--surf2)}
    .card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
    .card:hover .card-img img{transform:scale(1.04)}
    .card-img .overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(8,12,20,.9) 100%)}
    .img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--mute);font-size:.68rem;letter-spacing:1px;text-transform:uppercase}
    .card-body{padding:10px 12px 12px}
    .card-name{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:600;color:#dce8f5;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.5em;letter-spacing:.3px}
    .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
    .badge{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:500;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:4px}
    .badge.ok{background:rgba(0,200,255,.1);color:var(--accent);border:1px solid rgba(0,200,255,.2)}
    .badge.no{background:rgba(255,58,58,.08);color:#ff6060;border:1px solid rgba(255,58,58,.2)}
    .appid-tag{font-size:.65rem;color:var(--mute);font-family:monospace}

    /* STATES */
    .state-msg{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--dim)}
    .state-msg .icon{font-size:3rem;margin-bottom:16px;opacity:.4}
    .state-msg h3{font-family:'Rajdhani',sans-serif;font-size:1.4rem;letter-spacing:2px;margin-bottom:8px}
    .state-msg p{font-size:.82rem;color:var(--mute)}

    /* LOADER */
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;gap:20px}
    .spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    .loader-text{font-family:'Rajdhani',sans-serif;font-size:.85rem;letter-spacing:3px;text-transform:uppercase;color:var(--dim);animation:pulse 1.5s ease infinite}
    .progress-bar{width:200px;height:3px;background:var(--border);border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:999px;transition:width .4s;width:0%}

    /* SCROLL TOP */
    #scrollTop{position:fixed;bottom:28px;right:28px;z-index:100;width:42px;height:42px;background:var(--surf2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(12px);transition:all .25s;color:var(--dim)}
    #scrollTop.visible{opacity:1;transform:translateY(0)}
    #scrollTop:hover{border-color:var(--accent);color:var(--accent)}

    footer{position:relative;z-index:10;text-align:center;padding:0 20px 40px;color:var(--mute);font-size:.75rem;letter-spacing:1px}

    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    @media(max-width:480px){
      #grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
      header{padding:32px 16px 24px}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎮</div>
    <h1>ZonaSteam</h1>
  </div>
  <p class="tagline">Catálogo de juegos · Steam</p>
  <div class="search-wrap">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="buscador" placeholder="Buscar juego..." autocomplete="off" spellcheck="false"/>
      <button id="clear-btn" title="Limpiar">✕</button>
    </div>
    <p class="search-hint" id="search-hint">Escribí para buscar en el catálogo</p>
  </div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="disponible">✅ Disponibles</button>
  <button class="filter-btn" data-filter="no-disp">❌ No disponibles</button>
</div>

<p class="counter" id="counter"></p>

<div class="grid-wrap">
  <div id="grid">
    <div class="loader">
      <div class="spinner"></div>
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <span class="loader-text">Cargando catálogo</span>
    </div>
  </div>
</div>

<footer>ZonaSteam © 2025 — Activación vía Steam</footer>

<button id="scrollTop" title="Volver arriba" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M18 15l-6-6-6 6"/>
  </svg>
</button>

<script>
const SGDB_KEY  = "3d783acc57bc62f5f2a1f4ad393bbed7";
const STEAM_IMG = id => `https://cdn.akamai.steamstatic.com/steam/apps/${id}/header.jpg`;
const PAGE_SIZE = 60;

let todos       = [];
let filtrados   = [];
let pagina      = 0;
let filtro      = 'all';
let query       = '';
let cargandoMas = false;
let searchTimer = null;
const sgdbCache = {};

// ── CARGA ────────────────────────────────────────────────────
async function cargar() {
  const prog = document.getElementById('progress');
  try {
    prog.style.width = '10%';

    // Cargar ambos en paralelo
    const [rDisp, rDrm] = await Promise.all([
      fetch('disponibles_comprimido.json?t=' + Date.now()),
      fetch('drm_comprimido.json?t=' + Date.now())
    ]);

    prog.style.width = '70%';

    let disponibles = [];
    if (rDisp.ok) {
      const d = await rDisp.json();
      // Formato: [appid, nombre] — imagen se reconstruye desde appid
      disponibles = d.map(j => ({ appid: String(j[0]), nombre: j[1], imagen: null, disp: true }));
    }

    let drm = [];
    if (rDrm.ok) {
      const d = await rDrm.json();
      // Formato: [appid, nombre, imagen]
      const dispIds = new Set(disponibles.map(j => j.appid));
      drm = d
        .filter(j => !dispIds.has(String(j[0])))
        .map(j => ({ appid: String(j[0]), nombre: j[1], imagen: j[2] || null, disp: false }));
    }

    prog.style.width = '100%';

    // Disponibles primero, luego DRM
    todos = [...disponibles, ...drm];

    if (!todos.length) {
      mostrarVacio('No se encontró el catálogo', 'Asegurate de subir los archivos JSON');
      return;
    }

    aplicarFiltros();
  } catch(e) {
    mostrarVacio('Error al cargar', 'Intentá de nuevo más tarde.');
  }
}

// ── IMAGEN FALLBACK ───────────────────────────────────────────
async function obtenerImagenSGDB(appid) {
  if (sgdbCache[appid] !== undefined) return sgdbCache[appid];
  try {
    const r = await fetch(
      `https://www.steamgriddb.com/api/v2/grids/steam/${appid}?dimensions=460x215,920x430`,
      { headers: { 'Authorization': `Bearer ${SGDB_KEY}` } }
    );
    if (!r.ok) { sgdbCache[appid] = null; return null; }
    const data = await r.json();
    sgdbCache[appid] = data?.data?.[0]?.url ?? null;
    return sgdbCache[appid];
  } catch(e) { sgdbCache[appid] = null; return null; }
}

async function handleImgError(img) {
  if (!img.src.includes('cdn.akamai') && img.dataset.triedCdn !== '1') {
    img.dataset.triedCdn = '1';
    img.src = STEAM_IMG(img.dataset.appid);
    return;
  }
  if (img.dataset.triedSgdb !== '1') {
    img.dataset.triedSgdb = '1';
    const url = await obtenerImagenSGDB(img.dataset.appid);
    if (url) { img.src = url; return; }
  }
  img.parentElement.innerHTML = `
    <div class="img-ph">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="9" cy="9" r="2"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <span>Sin imagen</span>
    </div>`;
}

// ── FILTROS ──────────────────────────────────────────────────
function aplicarFiltros() {
  const q = query.toLowerCase().trim();
  filtrados = todos.filter(j => {
    const matchFiltro =
      filtro === 'all'        ? true :
      filtro === 'disponible' ? j.disp : !j.disp;
    const matchQ = q.length < 2 || j.nombre.toLowerCase().includes(q);
    return matchFiltro && matchQ;
  });
  pagina = 0;
  document.getElementById('grid').innerHTML = '';
  actualizarCounter();
  renderPagina();
}

function actualizarCounter() {
  const el      = document.getElementById('counter');
  const nDisp   = filtrados.filter(j => j.disp).length;
  const nNoDisp = filtrados.filter(j => !j.disp).length;
  if (!filtrados.length) { el.innerHTML = 'Sin resultados'; return; }
  el.innerHTML =
    `<span>${filtrados.length.toLocaleString()}</span> juego${filtrados.length !== 1 ? 's' : ''} — ` +
    `<span>${nDisp.toLocaleString()}</span> disponibles · ` +
    `${nNoDisp.toLocaleString()} no disponibles`;
}

// ── RENDER ───────────────────────────────────────────────────
function renderPagina() {
  const grid  = document.getElementById('grid');
  const desde = pagina * PAGE_SIZE;
  const hasta = Math.min(desde + PAGE_SIZE, filtrados.length);
  const chunk = filtrados.slice(desde, hasta);

  if (!chunk.length && !pagina) {
    mostrarVacio('Sin resultados', 'Probá con otro nombre');
    return;
  }

  requestAnimationFrame(() => {
    chunk.forEach((j, idx) => {
      const card = document.createElement('div');
      card.className = `card ${j.disp ? 'disponible' : 'no-disp'}`;
      card.style.animationDelay = `${(idx % PAGE_SIZE) * 10}ms`;
      const imgSrc = j.imagen || STEAM_IMG(j.appid);
      card.innerHTML = `
        <div class="card-img">
          <img src="${imgSrc}" alt="${esc(j.nombre)}" loading="lazy"
            data-appid="${j.appid}" data-tried-cdn="0" data-tried-sgdb="0"
            onerror="handleImgError(this)"/>
          <div class="overlay"></div>
        </div>
        <div class="card-body">
          <div class="card-name" title="${esc(j.nombre)}">${esc(j.nombre)}</div>
          <div class="card-footer">
            <span class="badge ${j.disp ? 'ok' : 'no'}">${j.disp ? '✅ Disponible' : '❌ No disponible'}</span>
            <span class="appid-tag">#${j.appid}</span>
          </div>
        </div>`;
      grid.appendChild(card);
    });
    pagina++;
  });
}

// ── INFINITE SCROLL ──────────────────────────────────────────
window.addEventListener('scroll', () => {
  const st = document.getElementById('scrollTop');
  window.scrollY > 400 ? st.classList.add('visible') : st.classList.remove('visible');
  if (cargandoMas || pagina * PAGE_SIZE >= filtrados.length) return;
  if (window.scrollY + window.innerHeight > document.documentElement.scrollHeight - 600) {
    cargandoMas = true;
    setTimeout(() => { renderPagina(); cargandoMas = false; }, 80);
  }
});

// ── BUSCADOR ─────────────────────────────────────────────────
const inputEl  = document.getElementById('buscador');
const clearBtn = document.getElementById('clear-btn');
const hintEl   = document.getElementById('search-hint');

inputEl.addEventListener('input', e => {
  clearBtn.style.display = e.target.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    query = e.target.value;
    const hayQ = query.trim().length >= 2;
    if (hayQ) {
      const total = todos.filter(j => j.nombre.toLowerCase().includes(query.toLowerCase().trim())).length;
      hintEl.textContent = `${total.toLocaleString()} resultado${total !== 1 ? 's' : ''} encontrado${total !== 1 ? 's' : ''}`;
      hintEl.className = 'search-hint found';
    } else {
      hintEl.textContent = 'Escribí para buscar en el catálogo';
      hintEl.className = 'search-hint';
    }
    aplicarFiltros();
  }, 200);
});

clearBtn.addEventListener('click', () => {
  inputEl.value = '';
  clearBtn.style.display = 'none';
  hintEl.textContent = 'Escribí para buscar en el catálogo';
  hintEl.className = 'search-hint';
  query = '';
  aplicarFiltros();
});

// ── FILTROS BOTONES ──────────────────────────────────────────
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtro = btn.dataset.filter;
  aplicarFiltros();
});

// ── HELPERS ──────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function mostrarVacio(titulo, sub) {
  document.getElementById('grid').innerHTML = `
    <div class="state-msg">
      <div class="icon">🎮</div>
      <h3>${titulo}</h3>
      <p>${sub}</p>
    </div>`;
  document.getElementById('counter').innerHTML = '';
}

cargar();
</script>
</body>
</html>
