<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZonaSteam — Catálogo Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      /* Paleta de colores profunda y elegante */
      --bg:           #05080f;
      --surface:      rgba(13, 18, 32, 0.7);
      --surface-hover:rgba(20, 28, 48, 0.9);
      --surface2:     rgba(255, 255, 255, 0.03);
      --border:       rgba(255, 255, 255, 0.1);
      --accent:       #00e5ff;
      --accent-dark:  #0077ff;
      --danger:       #ff3a3a;
      --warning:      #f0a500;
      --success:      #00e676;
      --text:         #e2e8f0;
      --text-dim:     #94a3b8;
      --text-mute:    #475569;
      --glow-cyan:    rgba(0, 229, 255, 0.3);
      --glow-orange:  rgba(240, 165, 0, 0.15);
    }

    *, *::before, *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    html { 
      scroll-behavior: smooth; 
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Fondo animado sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle 800px at 50% -20%, rgba(0, 119, 255, 0.15), transparent),
        radial-gradient(circle 600px at 90% 80%, rgba(0, 229, 255, 0.05), transparent);
      pointer-events: none;
      z-index: -1;
    }

    /* HEADER CON LOGO EN CÓDIGO (CSS) */
    header {
      position: relative;
      z-index: 10;
      padding: 50px 24px 30px;
      text-align: center;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0, 119, 255, 0.05) 0%, transparent 100%);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
      cursor: default;
    }

    .logo-icon {
      width: 52px; 
      height: 52px;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      border-radius: 14px;
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 25px var(--glow-cyan);
      border: 1px solid rgba(0, 229, 255, 0.4);
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(to bottom right, #ffffff, #8be9fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
      margin: 0;
    }

    .tagline {
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 5px;
    }

    /* BUSCADOR */
    .search-section {
      max-width: 680px;
      margin: 35px auto 0;
      padding: 0 20px;
    }

    .search-box { 
      position: relative; 
    }

    .search-box svg {
      position: absolute;
      left: 22px; 
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
      transition: color 0.3s;
    }

    #buscador {
      width: 100%;
      padding: 18px 24px 18px 58px;
      background: var(--surface2);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: #fff;
      font-size: 1.1rem;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #buscador:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 0 0 4px var(--glow-cyan);
    }

    #buscador:focus + svg { 
      color: var(--accent); 
    }

    #buscador::placeholder { 
      color: var(--text-mute); 
    }

    .search-hint {
      text-align: center;
      color: var(--text-mute);
      font-size: 0.8rem;
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    /* FILTROS */
    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 25px 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 22px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .filter-btn:hover { 
      border-color: rgba(255,255,255,0.2); 
      color: var(--text); 
    }
    
    .filter-btn.active {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px var(--glow-cyan);
      border-color: var(--accent);
    }

    .counter {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 20px;
    }
    
    .counter span { 
      color: var(--accent); 
      font-weight: 700; 
    }

    /* GRID DE JUEGOS */
    .grid-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px 100px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }

    /* TARJETA */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: fadeIn 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-10px);
      background: var(--surface-hover);
    }

    .card.disponible:hover { 
      border-color: var(--accent); 
      box-shadow: 0 15px 45px rgba(0,0,0,0.5), 0 0 20px var(--glow-cyan); 
    }
    
    .card.no-disponible:hover { 
      border-color: var(--warning); 
      box-shadow: 0 15px 45px rgba(0,0,0,0.5), 0 0 20px var(--glow-orange); 
    }

    .card-img {
      position: relative;
      aspect-ratio: 16/7;
      background: #000;
      overflow: hidden;
    }

    .card-img img {
      width: 100%; 
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s, filter 0.3s;
    }

    /* Efecto Blanco y Negro para juegos Próximamente */
    .card.no-disponible .card-img img {
      filter: grayscale(100%) opacity(0.5);
    }

    .card:hover .card-img img { 
      transform: scale(1.1); 
    }
    
    .card.no-disponible:hover .card-img img {
      filter: grayscale(70%) opacity(0.8);
    }

    .card-img .overlay {
      position: absolute; 
      inset: 0;
      background: linear-gradient(180deg, transparent 30%, var(--bg) 100%);
    }

    .card-body { 
      padding: 14px 16px 18px; 
      display: flex;
      flex-direction: column;
      flex: 1;
      justify-content: space-between;
    }

    .card-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 15px;
      min-height: 2.4em;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.ok { 
      background: rgba(0, 230, 118, 0.15); 
      color: var(--success); 
      border: 1px solid rgba(0, 230, 118, 0.3); 
    }

    .badge.no { 
      background: rgba(240, 165, 0, 0.15); 
      color: var(--warning); 
      border: 1px solid rgba(240, 165, 0, 0.3); 
    }

    .appid-tag { 
      font-size: 0.7rem; 
      color: var(--text-mute); 
      font-family: monospace; 
      background: rgba(255,255,255,0.05);
      padding: 3px 6px;
      border-radius: 4px;
    }

    /* ESTADOS DE CARGA Y MENSAJES */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 100px 20px;
    }

    .state-msg .icon { 
      font-size: 4rem; 
      margin-bottom: 20px; 
      opacity: 0.3; 
      filter: drop-shadow(0 0 20px var(--accent)); 
    }

    .state-msg h3 { 
      font-family: 'Rajdhani', sans-serif; 
      font-size: 1.8rem; 
      letter-spacing: 2px; 
      color: #fff; 
      margin-bottom: 8px; 
    }

    .state-msg p { 
      font-size: 0.95rem; 
      color: var(--text-dim); 
    }

    .loader { 
      text-align: center; 
      padding: 100px; 
      grid-column: 1/-1; 
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .spinner {
      width: 50px; 
      height: 50px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
      box-shadow: 0 0 20px var(--glow-cyan);
    }

    .loader-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      animation: pulse 1.5s ease infinite;
    }

    /* SCROLL TOP */
    #scrollTop {
      position: fixed;
      bottom: 32px; 
      right: 32px;
      z-index: 100;
      width: 48px; 
      height: 48px;
      background: var(--surface2);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; 
      align-items: center; 
      justify-content: center;
      cursor: pointer;
      opacity: 0; 
      transform: translateY(20px);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      color: var(--text-dim);
    }

    #scrollTop.visible { 
      opacity: 1; 
      transform: translateY(0); 
    }
    
    #scrollTop:hover { 
      border-color: var(--accent); 
      color: var(--accent); 
      box-shadow: 0 8px 24px var(--glow-cyan);
      transform: translateY(-4px);
    }

    footer {
      text-align: center;
      padding: 0 20px 40px;
      color: var(--text-mute);
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    @media (max-width: 600px) {
      #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
      header { padding: 40px 16px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎮</div>
    <h1>ZonaSteam</h1>
  </div>
  <p class="tagline">Catálogo Oficial de Activaciones</p>
  
  <div class="search-section">
    <div class="search-box">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="buscador" placeholder="Buscar juego..." autocomplete="off"/>
    </div>
  </div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">Todos los Juegos</button>
  <button class="filter-btn" data-filter="disponible">✅ Disponibles</button>
  <button class="filter-btn" data-filter="no-disponible">⏳ Próximamente</button>
</div>

<p class="counter" id="counter"></p>

<div class="grid-wrap">
  <div id="grid">
    <div class="loader">
      <div class="spinner"></div>
      <span class="loader-text">Sincronizando Catálogo...</span>
    </div>
  </div>
</div>

<footer>ZonaSteam © 2026 — Sistema de Activaciones Offline</footer>

<button id="scrollTop" title="Volver arriba" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 15l-6-6-6 6"/>
  </svg>
</button>

<script>
  const PAGE_SIZE = 60;
  const STEAM_IMG = id => `https://cdn.akamai.steamstatic.com/steam/apps/${id}/header.jpg`;

  let todosJuegos  = [];
  let filtrados    = [];
  let paginaActual = 0;
  let filtroActivo = 'all';
  let queryActual  = '';
  let cargandoMas  = false;
  let searchTimer  = null;

  async function cargar() {
    try {
      let data = null;

      // 1. INTENTO PRINCIPAL: Usamos la API de GitHub para obtener los cambios al instante.
      // Al usar "application/vnd.github.v3.raw", GitHub nos da el archivo saltándose el caché.
      try {
        const apiResponse = await fetch('https://api.github.com/repos/zonasteamstore-gif/catalogo/contents/catalogo.json', {
          headers: {
            'Accept': 'application/vnd.github.v3.raw',
            'Cache-Control': 'no-cache'
          }
        });
        
        if (apiResponse.ok) {
          data = await apiResponse.json();
          console.log("Catálogo cargado al instante desde la API.");
        }
      } catch (error) {
        // Ignoramos el error silenciosamente, esto ocurre si pasamos el límite de peticiones de la API.
      }

      // 2. PLAN B (FALLBACK SEGURO): Si el intento 1 falló por límite de peticiones (60/hora),
      // pedimos el archivo por el CDN normal. Nunca dejará al usuario con la pantalla vacía.
      if (!data) {
        const cdnResponse = await fetch('https://raw.githubusercontent.com/zonasteamstore-gif/catalogo/main/catalogo.json?t=' + Date.now(), {
          cache: 'no-store'
        });
        
        if (cdnResponse.ok) {
          data = await cdnResponse.json();
          console.log("Catálogo cargado desde el CDN (Plan B activado).");
        }
      }

      // 3. Si logramos obtener los datos por cualquiera de las 2 vías, los procesamos.
      if (data && Array.isArray(data)) {
        todosJuegos = data.map(j => {
          const appid = j[0];
          const nombre = j[1];
          const disponible = j[2] === 1; // 1 = Disponible, 0 = Próximamente
          
          return [appid, nombre, disponible];
        });
      }

      if (todosJuegos.length === 0) {
        mostrarVacio('Catálogo no encontrado', 'Asegúrate de que el archivo catalogo.json esté publicado en GitHub.');
        return;
      }
      
      aplicarFiltros();
      
    } catch(e) {
      mostrarVacio('Error de conexión', 'No se pudo obtener el catálogo desde los servidores.');
      console.error(e);
    }
  }

  function aplicarFiltros() {
    const q = queryActual.toLowerCase().trim();
    
    filtrados = todosJuegos.filter(j => {
      const matchFiltro =
        filtroActivo === 'all'        ? true :
        filtroActivo === 'disponible' ? j[2] === true : 
        filtroActivo === 'no-disponible' ? j[2] === false : true;
        
      const matchQuery = q.length < 2 || j[1].toLowerCase().includes(q);
      
      return matchFiltro && matchQuery;
    });
    
    paginaActual = 0;
    document.getElementById('grid').innerHTML = '';
    actualizarCounter();
    renderPagina();
  }

  function actualizarCounter() {
    const disp   = filtrados.filter(j => j[2] === true).length;
    const noDisp = filtrados.filter(j => j[2] === false).length;
    const el = document.getElementById('counter');
    
    if (filtrados.length === 0) { 
      el.innerHTML = 'Sin coincidencias para la búsqueda.'; 
      return; 
    }
    
    el.innerHTML =
      `Viendo <span>${filtrados.length.toLocaleString()}</span> juegos — ` +
      `<span style="color:var(--success)">${disp.toLocaleString()}</span> disponibles · ` +
      `<span style="color:var(--warning)">${noDisp.toLocaleString()}</span> próximamente`;
  }

  function renderPagina() {
    const grid  = document.getElementById('grid');
    const desde = paginaActual * PAGE_SIZE;
    const hasta = Math.min(desde + PAGE_SIZE, filtrados.length);
    const chunk = filtrados.slice(desde, hasta);

    if (chunk.length === 0 && paginaActual === 0) {
      mostrarVacio('Sin resultados', 'Prueba buscando otro nombre.');
      return;
    }

    chunk.forEach((j, idx) => {
      const appid = j[0];
      const nombre = j[1];
      const disponible = j[2]; // true o false
      
      const card = document.createElement('div');
      card.className = `card ${disponible ? 'disponible' : 'no-disponible'}`;
      card.style.animationDelay = `${(idx % PAGE_SIZE) * 15}ms`;
      
      card.innerHTML = `
        <div class="card-img">
          <img src="${STEAM_IMG(appid)}" alt="${esc(nombre)}" loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><svg width=\\'32\\' height=\\'32\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'3\\'/><circle cx=\\'9\\' cy=\\'9\\' r=\\'2\\'/><path d=\\'m21 15-5-5L5 21\\'/></svg></div>'"/>
          <div class="overlay"></div>
        </div>
        <div class="card-body">
          <div class="card-name" title="${esc(nombre)}">${esc(nombre)}</div>
          <div class="card-footer">
            <span class="badge ${disponible ? 'ok' : 'no'}">${disponible ? '✅ Disponible' : '⏳ Próximamente'}</span>
            <span class="appid-tag">#${appid}</span>
          </div>
        </div>`;
        
      grid.appendChild(card);
    });
    
    paginaActual++;
  }

  window.addEventListener('scroll', () => {
    const st = document.getElementById('scrollTop');
    if (window.scrollY > 400) {
      st.classList.add('visible');
    } else {
      st.classList.remove('visible');
    }
    
    if (cargandoMas) return;
    if (paginaActual * PAGE_SIZE >= filtrados.length) return;
    
    if (window.scrollY + window.innerHeight > document.documentElement.scrollHeight - 800) {
      cargandoMas = true;
      setTimeout(() => { 
        renderPagina(); 
        cargandoMas = false; 
      }, 50);
    }
  });

  document.getElementById('buscador').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { 
      queryActual = e.target.value; 
      aplicarFiltros(); 
    }, 250);
  });

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    filtroActivo = btn.dataset.filter;
    aplicarFiltros();
  });

  function esc(s) {
    if (!s) return "";
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function mostrarVacio(titulo, sub) {
    document.getElementById('grid').innerHTML = `
      <div class="state-msg">
        <div class="icon">🎮</div>
        <h3>${titulo}</h3>
        <p>${sub}</p>
      </div>`;
    document.getElementById('counter').innerHTML = '';
  }

  // Inicializar carga
  cargar();
</script>
</body>
</html>
