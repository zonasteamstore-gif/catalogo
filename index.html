<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZonaSteam — Catálogo Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      /* Paleta de colores Premium */
      --bg:           #05080f;
      --surface:      rgba(13, 18, 32, 0.7);
      --surface-hover:rgba(20, 28, 48, 0.9);
      --surface2:     rgba(255, 255, 255, 0.03);
      --border:       rgba(255, 255, 255, 0.1);
      --accent:       #00e5ff;
      --accent-dark:  #0077ff;
      --danger:       #ff3a3a;
      --warning:      #f0a500;
      --success:      #00e676;
      --text:         #e2e8f0;
      --text-dim:     #94a3b8;
      --text-mute:    #475569;
      --glow-cyan:    rgba(0, 229, 255, 0.3);
      --glow-orange:  rgba(240, 165, 0, 0.15);
    }

    *, *::before, *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    html { 
      scroll-behavior: smooth; 
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Fondo animado sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle 800px at 50% -20%, rgba(0, 119, 255, 0.15), transparent),
        radial-gradient(circle 600px at 90% 80%, rgba(0, 229, 255, 0.05), transparent);
      pointer-events: none;
      z-index: -1;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      padding: 60px 24px 40px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0, 119, 255, 0.05) 0%, transparent 100%);
      backdrop-filter: blur(10px);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
    }

    .logo-icon {
      width: 48px; 
      height: 48px;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      border-radius: 12px;
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 30px var(--glow-cyan);
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(255,255,255,0.1);
    }

    .tagline {
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* BUSCADOR */
    .search-section {
      position: relative;
      max-width: 680px;
      margin: 40px auto 0;
      padding: 0 20px;
    }

    .search-box { 
      position: relative; 
    }

    .search-box svg {
      position: absolute;
      left: 20px; 
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
      transition: color 0.3s;
    }

    #buscador {
      width: 100%;
      padding: 16px 24px 16px 54px;
      background: var(--surface2);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      outline: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    #buscador:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 4px var(--glow-cyan), 0 8px 32px rgba(0,0,0,0.4);
    }

    #buscador:focus + svg { 
      color: var(--accent); 
    }

    #buscador::placeholder { 
      color: var(--text-mute); 
    }

    .search-hint {
      text-align: center;
      color: var(--text-mute);
      font-size: 0.8rem;
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    /* FILTROS */
    .filters {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 30px 20px 0;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      backdrop-filter: blur(4px);
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.5px;
    }

    .filter-btn:hover { 
      border-color: rgba(255,255,255,0.2); 
      color: var(--text); 
    }
    
    .filter-btn.active {
      background: var(--glow-cyan);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 15px var(--glow-cyan);
    }

    .counter {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 20px 20px 0;
      letter-spacing: 0.5px;
    }

    .counter span { 
      color: #fff; 
      font-weight: 600; 
    }

    .counter span.disp-count { 
      color: var(--success); 
    }

    .counter span.nodisp-count { 
      color: var(--warning); 
    }

    /* GRID */
    .grid-wrap {
      max-width: 1400px;
      margin: 30px auto 0;
      padding: 0 24px 80px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .card {
      background: var(--surface);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      animation: fadeIn 0.4s ease both;
    }

    .card:hover { 
      transform: translateY(-6px); 
      background: var(--surface-hover);
    }
    
    .card.disponible:hover { 
      border-color: var(--accent); 
      box-shadow: 0 12px 40px var(--glow-cyan); 
    }
    
    .card.no-disponible:hover { 
      border-color: var(--warning); 
      box-shadow: 0 12px 40px var(--glow-orange); 
    }

    .card-img {
      position: relative;
      aspect-ratio: 16/7;
      overflow: hidden;
      background: #000;
    }

    .card-img img {
      width: 100%; 
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease, filter 0.3s ease;
    }

    /* Grayscale para Próximamente */
    .card.no-disponible .card-img img {
      filter: grayscale(100%) opacity(0.6);
    }

    .card:hover .card-img img { 
      transform: scale(1.08); 
    }
    
    .card.no-disponible:hover .card-img img {
      filter: grayscale(70%) opacity(0.9);
    }

    .card-img .overlay {
      position: absolute; 
      inset: 0;
      background: linear-gradient(180deg, transparent 30%, var(--bg) 100%);
    }

    .card-body { 
      padding: 14px 16px 18px; 
      display: flex;
      flex-direction: column;
      flex: 1;
      justify-content: space-between;
    }

    .card-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      min-height: 2.4em;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .badge.ok { 
      background: rgba(0, 230, 118, 0.1); 
      color: var(--success); 
      border: 1px solid rgba(0, 230, 118, 0.2); 
    }

    .badge.no { 
      background: rgba(240, 165, 0, 0.1); 
      color: var(--warning); 
      border: 1px solid rgba(240, 165, 0, 0.2); 
    }

    .appid-tag { 
      font-size: 0.7rem; 
      color: var(--text-mute); 
      font-family: monospace; 
      background: rgba(255,255,255,0.05);
      padding: 3px 6px;
      border-radius: 4px;
    }

    /* ESTADOS DE CARGA */
    .loader {
      grid-column: 1 / -1;
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      padding: 120px 20px; 
      gap: 24px;
    }

    .spinner {
      width: 48px; 
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
      box-shadow: 0 0 20px var(--glow-cyan);
    }

    .loader-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      animation: pulse 1.5s ease infinite;
    }

    /* SCROLL TOP */
    #scrollTop {
      position: fixed;
      bottom: 32px; 
      right: 32px;
      z-index: 100;
      width: 48px; 
      height: 48px;
      background: var(--surface2);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; 
      align-items: center; 
      justify-content: center;
      cursor: pointer;
      opacity: 0; 
      transform: translateY(20px);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      color: var(--text-dim);
    }

    #scrollTop.visible { opacity: 1; transform: translateY(0); }

    footer {
      text-align: center;
      padding: 0 20px 40px;
      color: var(--text-mute);
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    @media (max-width: 600px) {
      #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
      header { padding: 40px 16px 24px; }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎮</div>
    <h1>ZonaSteam</h1>
  </div>
  <p class="tagline">Catálogo Oficial de Juegos</p>
  
  <div class="search-section">
    <div class="search-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="buscador" placeholder="Buscar por nombre de juego..." autocomplete="off" spellcheck="false"/>
    </div>
  </div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">Todos los Juegos</button>
  <button class="filter-btn" data-filter="disponible">✅ Disponible</button>
  <button class="filter-btn" data-filter="no-disponible">⏳ Próximamente</button>
</div>

<p class="counter" id="counter"></p>

<div class="grid-wrap">
  <div id="grid">
    <div class="loader">
      <div class="spinner"></div>
      <span class="loader-text">Cargando Catálogo</span>
    </div>
  </div>
</div>

<footer>ZonaSteam © 2026 — Activaciones Digitales</footer>

<button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M18 15l-6-6-6 6"/>
  </svg>
</button>

<script>
  /* LÓGICA DE JAVASCRIPT EXPANDIDA */
  const PAGE_SIZE = 60;
  const STEAM_IMG = id => `https://cdn.akamai.steamstatic.com/steam/apps/${id}/header.jpg`;

  let todosJuegos  = [];
  let filtrados    = [];
  let paginaActual = 0;
  let filtroActivo = 'all';
  let queryActual  = '';
  let cargandoMas  = false;
  let searchTimer  = null;

  async function cargar() {
    try {
      let disponibles = [];
      try {
        const r = await fetch('catalogo.json?t=' + Date.now());
        if (r.ok) {
          const data = await r.json();
          disponibles = data.map(j => [j.appid ?? j[0], j.nombre ?? j.name ?? j[1], true]);
        }
      } catch(e) { console.error("Error al cargar catalogo.json", e); }

      let noDisponibles = [];
      try {
        const r2 = await fetch('catalogo_comprimido.json?t=' + Date.now());
        if (r2.ok) {
          const data2 = await r2.json();
          noDisponibles = data2.map(j => [j[0], j[1], false]);
        }
      } catch(e) { console.error("Error al cargar catalogo_comprimido.json", e); }

      const appidsDisp = new Set(disponibles.map(j => j[0]));
      const noDispFilt = noDisponibles.filter(j => !appidsDisp.has(j[0]));
      
      todosJuegos = [...disponibles, ...noDispFilt];

      if (todosJuegos.length === 0) {
        mostrarVacio('Catálogo no encontrado', 'Asegúrate de tener los archivos JSON en la raíz.');
        return;
      }
      
      aplicarFiltros();
      
    } catch(e) {
      mostrarVacio('Error de conexión', 'No se pudo sincronizar el catálogo.');
    }
  }

  function aplicarFiltros() {
    const q = queryActual.toLowerCase().trim();
    
    filtrados = todosJuegos.filter(j => {
      const matchFiltro =
        filtroActivo === 'all'        ? true :
        filtroActivo === 'disponible' ? j[2] === true : j[2] === false;
        
      const matchQuery = q.length < 2 || j[1].toLowerCase().includes(q);
      return matchFiltro && matchQuery;
    });
    
    paginaActual = 0;
    document.getElementById('grid').innerHTML = '';
    actualizarCounter();
    renderPagina();
  }

  function actualizarCounter() {
    const disp   = filtrados.filter(j => j[2]).length;
    const noDisp = filtrados.filter(j => !j[2]).length;
    const el = document.getElementById('counter');
    
    if (filtrados.length === 0) { 
      el.innerHTML = 'Sin coincidencias para la búsqueda.'; 
      return; 
    }
    
    el.innerHTML =
      `Mostrando <span>${filtrados.length.toLocaleString()}</span> juegos — ` +
      `<span class="disp-count">${disp.toLocaleString()}</span> disponibles · ` +
      `<span class="nodisp-count">${noDisp.toLocaleString()}</span> próximamente`;
  }

  function renderPagina() {
    const grid  = document.getElementById('grid');
    const desde = paginaActual * PAGE_SIZE;
    const hasta = Math.min(desde + PAGE_SIZE, filtrados.length);
    const chunk = filtrados.slice(desde, hasta);

    if (chunk.length === 0 && paginaActual === 0) {
      mostrarVacio('Sin resultados', 'Prueba con otro nombre oAppID.');
      return;
    }

    chunk.forEach((j, idx) => {
      const [appid, nombre, disponible] = j;
      const card = document.createElement('div');
      
      card.className = `card ${disponible ? 'disponible' : 'no-disponible'}`;
      card.style.animationDelay = `${(idx % PAGE_SIZE) * 15}ms`;
      
      card.innerHTML = `
        <div class="card-img">
          <img src="${STEAM_IMG(appid)}" alt="${esc(nombre)}" loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><svg width=\\'32\\' height=\\'32\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'3\\'/><circle cx=\\'9\\' cy=\\'9\\' r=\\'2\\'/><path d=\\'m21 15-5-5L5 21\\'/></svg></div>'"/>
          <div class="overlay"></div>
        </div>
        <div class="card-body">
          <div class="card-name" title="${esc(nombre)}">${esc(nombre)}</div>
          <div class="card-footer">
            <span class="badge ${disponible ? 'ok' : 'no'}">${disponible ? 'Disponible' : 'Próximamente'}</span>
            <span class="appid-tag">#${appid}</span>
          </div>
        </div>`;
      grid.appendChild(card);
    });
    
    paginaActual++;
  }

  window.addEventListener('scroll', () => {
    const st = document.getElementById('scrollTop');
    if (window.scrollY > 400) st.classList.add('visible');
    else st.classList.remove('visible');
    
    if (cargandoMas) return;
    if (paginaActual * PAGE_SIZE >= filtrados.length) return;
    
    if (window.scrollY + window.innerHeight > document.documentElement.scrollHeight - 800) {
      cargandoMas = true;
      setTimeout(() => { renderPagina(); cargandoMas = false; }, 50);
    }
  });

  document.getElementById('buscador').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { queryActual = e.target.value; aplicarFiltros(); }, 250);
  });

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroActivo = btn.dataset.filter;
    aplicarFiltros();
  });

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function mostrarVacio(titulo, sub) {
    document.getElementById('grid').innerHTML = `
      <div class="state-msg">
        <div class="icon">🎮</div>
        <h3>${titulo}</h3>
        <p>${sub}</p>
      </div>`;
    document.getElementById('counter').innerHTML = '';
  }

  // Inicializar carga
  cargar();
</script>
</body>
</html>
