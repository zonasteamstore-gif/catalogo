<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZonaSteam — Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#060a10;--s:#0b1018;--s2:#0f1520;--b:#182030;--a:#00c8ff;--a2:#0055ff;--t:#c4d4e8;--d:#3a4d63;--m:#1a2535}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 70% 35% at 50% -5%,rgba(0,85,255,.07) 0%,transparent 70%),
                 radial-gradient(ellipse 40% 25% at 85% 85%,rgba(0,200,255,.04) 0%,transparent 60%)}
    header{position:relative;z-index:10;padding:52px 24px 40px;text-align:center;border-bottom:1px solid var(--b);background:linear-gradient(180deg,rgba(0,85,255,.05) 0%,transparent 100%)}
    .logo{display:inline-flex;align-items:center;gap:14px;margin-bottom:8px}
    .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--a2),var(--a));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 28px rgba(0,200,255,.25)}
    h1{font-family:'Rajdhani',sans-serif;font-size:clamp(2.2rem,5vw,3.4rem);font-weight:700;letter-spacing:5px;text-transform:uppercase;background:linear-gradient(135deg,#fff 25%,var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .tagline{color:var(--d);font-size:.78rem;letter-spacing:2.5px;text-transform:uppercase;margin-top:6px}
    .search-wrap{position:relative;z-index:10;max-width:660px;margin:28px auto 0;padding:0 20px}
    .search-box{position:relative}
    .search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--d);pointer-events:none;transition:color .2s}
    .search-box:focus-within .search-icon{color:var(--a)}
    #buscador{width:100%;padding:15px 50px 15px 52px;background:var(--s2);border:1px solid var(--b);border-radius:14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s}
    #buscador:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(0,200,255,.08)}
    #buscador::placeholder{color:var(--d)}
    #clear-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--d);cursor:pointer;font-size:1rem;padding:4px 6px;display:none;line-height:1;transition:color .2s}
    #clear-btn:hover{color:var(--a)}
    .search-hint{text-align:center;color:var(--d);font-size:.74rem;margin-top:10px;letter-spacing:.5px;min-height:1.2em}
    .search-hint.found{color:var(--a)}
    .filters{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;gap:8px;padding:22px 20px 0;flex-wrap:wrap}
    .filter-btn{padding:6px 18px;border-radius:999px;border:1px solid var(--b);background:transparent;color:var(--d);font-family:'DM Sans',sans-serif;font-size:.76rem;cursor:pointer;transition:all .2s;letter-spacing:.4px}
    .filter-btn:hover{border-color:var(--a);color:var(--a)}
    .filter-btn.active{background:rgba(0,200,255,.08);border-color:var(--a);color:var(--a)}
    .counter{position:relative;z-index:10;text-align:center;color:var(--d);font-size:.76rem;padding:14px 20px 0;letter-spacing:.4px;min-height:2em}
    .counter span{color:var(--a);font-weight:500}
    .grid-wrap{position:relative;z-index:10;max-width:1440px;margin:20px auto 0;padding:0 20px 60px}
    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
    .card{background:var(--s);border:1px solid var(--b);border-radius:12px;overflow:hidden;transition:transform .18s,border-color .18s,box-shadow .18s;animation:fadeIn .25s ease both}
    .card:hover{transform:translateY(-4px);box-shadow:0 10px 36px rgba(0,0,0,.5)}
    .card.disponible:hover{border-color:rgba(0,200,255,.35)}
    .card.no-disp:hover{border-color:rgba(255,60,60,.25)}
    .card-img{position:relative;aspect-ratio:460/215;overflow:hidden;background:var(--s2)}
    .card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .28s}
    .card:hover .card-img img{transform:scale(1.05)}
    .card-img .overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(6,10,16,.92) 100%)}
    .img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--m);font-size:.65rem;letter-spacing:1px;text-transform:uppercase}
    .card-body{padding:9px 11px 11px}
    .card-name{font-family:'Rajdhani',sans-serif;font-size:.92rem;font-weight:600;color:#d8e8f8;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.4em;letter-spacing:.2px}
    .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
    .badge{display:inline-flex;align-items:center;gap:3px;font-size:.65rem;font-weight:500;letter-spacing:.7px;text-transform:uppercase;padding:2px 7px;border-radius:4px}
    .badge.ok{background:rgba(0,200,255,.08);color:var(--a);border:1px solid rgba(0,200,255,.18)}
    .badge.no{background:rgba(255,60,60,.06);color:#ff6060;border:1px solid rgba(255,60,60,.18)}
    .appid-tag{font-size:.62rem;color:var(--d);font-family:monospace}
    .state-msg{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--d)}
    .state-msg .icon{font-size:3rem;margin-bottom:16px;opacity:.35}
    .state-msg h3{font-family:'Rajdhani',sans-serif;font-size:1.4rem;letter-spacing:2px;margin-bottom:8px}
    .state-msg p{font-size:.8rem;color:var(--m)}
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;gap:18px}
    .spinner{width:38px;height:38px;border:2px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite}
    .loader-text{font-family:'Rajdhani',sans-serif;font-size:.82rem;letter-spacing:3px;text-transform:uppercase;color:var(--d);animation:pulse 1.4s ease infinite}
    .progress-bar{width:180px;height:2px;background:var(--b);border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--a2),var(--a));border-radius:999px;transition:width .35s;width:0%}
    #scrollTop{position:fixed;bottom:26px;right:26px;z-index:100;width:40px;height:40px;background:var(--s2);border:1px solid var(--b);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(10px);transition:all .22s;color:var(--d)}
    #scrollTop.visible{opacity:1;transform:translateY(0)}
    #scrollTop:hover{border-color:var(--a);color:var(--a)}
    #sentinel{height:1px}
    footer{position:relative;z-index:10;text-align:center;padding:0 20px 36px;color:var(--m);font-size:.72rem;letter-spacing:1px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @media(max-width:480px){#grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}header{padding:32px 16px 24px}}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎮</div>
    <h1>ZonaSteam</h1>
  </div>
  <p class="tagline">Catálogo de juegos · Steam</p>
  <div class="search-wrap">
    <div class="search-box">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="buscador" placeholder="Buscar juego... (ej: spiderman, witcher 3)" autocomplete="off" spellcheck="false"/>
      <button id="clear-btn" title="Limpiar">✕</button>
    </div>
    <p class="search-hint" id="search-hint">Escribí para buscar en el catálogo</p>
  </div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="disponible">✅ Disponibles</button>
  <button class="filter-btn" data-filter="no-disp">❌ No disponibles</button>
</div>

<p class="counter" id="counter"></p>

<div class="grid-wrap">
  <div id="grid">
    <div class="loader">
      <div class="spinner"></div>
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <span class="loader-text">Cargando catálogo</span>
    </div>
  </div>
  <div id="sentinel"></div>
</div>

<footer>ZonaSteam © 2025 — Activación vía Steam</footer>

<button id="scrollTop" title="Volver arriba" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M18 15l-6-6-6 6"/>
  </svg>
</button>

<script>
const CATALOGO_URL = "https://raw.githubusercontent.com/zonasteamstore-gif/catalogo/main/catalogo.json";
const SGDB_KEY  = "3d783acc57bc62f5f2a1f4ad393bbed7";
const STEAM_IMG = id => `https://cdn.akamai.steamstatic.com/steam/apps/${id}/header.jpg`;
const PAGE_SIZE = 60;
const IMG_PH    = `<div class="img-ph"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg><span>Sin imagen</span></div>`;

let todos=[], base=[], filtrados=[], pagina=0;
let filtro='all', query='', cargandoMas=false, searchTimer=null;
const sgdbCache={};

// ── BÚSQUEDA ──────────────────────────────────────────────────
// Normaliza quitando acentos y caracteres especiales
function preNorm(s) {
  return s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]/g," ").replace(/\s+/g," ").trim();
}

function buscar(lista, q) {
  if (!q || q.trim().length < 2) return lista;
  const qt = preNorm(q).split(" ").filter(Boolean);
  if (!qt.length) return lista;
  const qJoin = qt.join(" ");

  const exact = [], partial = [];

  for (let i = 0; i < lista.length; i++) {
    const j = lista[i];
    const n = j._n;

    // Todos los tokens deben aparecer en el nombre
    let allMatch = true;
    for (let k = 0; k < qt.length; k++) {
      if (!n.includes(qt[k])) { allMatch = false; break; }
    }
    if (!allMatch) continue;

    // Separar coincidencia exacta del substring completo vs tokens sueltos
    if (n.includes(qJoin)) exact.push(j);
    else partial.push(j);
  }

  // Exactos primero, después parciales — ambos grupos ordenados por AppID (popularidad)
  exact.sort((a,b)  => Number(a.appid) - Number(b.appid));
  partial.sort((a,b) => Number(a.appid) - Number(b.appid));
  return [...exact, ...partial];
}

// ── CARGA ─────────────────────────────────────────────────────
async function cargar() {
  const prog = document.getElementById('progress');
  try {
    prog.style.width = '15%';
    const resp = await fetch(CATALOGO_URL + '?t=' + Date.now());
    prog.style.width = '75%';
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    prog.style.width = '100%';

    // Pre-computar nombre normalizado y palabras una sola vez
    todos = data.map(j => {
      const n = preNorm(j[1]);
      return { appid: String(j[0]), nombre: j[1], disp: j[2]===1, imagen: j[3]||null, _n: n, _w: n.split(" ") };
    });

    if (!todos.length) { mostrarVacio('Sin catálogo', 'No se encontraron juegos.'); return; }
    // Ordenar por AppID ascendente (juegos más populares/conocidos primero)
    todos.sort((a,b) => Number(a.appid) - Number(b.appid));
    aplicarFiltros();
  } catch { mostrarVacio('Error al cargar', 'Intentá de nuevo más tarde.'); }
}

// ── IMAGEN FALLBACK ───────────────────────────────────────────
async function obtenerImagenSGDB(appid) {
  if (sgdbCache[appid] !== undefined) return sgdbCache[appid];
  try {
    const r = await fetch(
      `https://www.steamgriddb.com/api/v2/grids/steam/${appid}?dimensions=460x215,920x430`,
      { headers: { 'Authorization': `Bearer ${SGDB_KEY}` } }
    );
    if (!r.ok) { sgdbCache[appid] = null; return null; }
    const d = await r.json();
    sgdbCache[appid] = d?.data?.[0]?.url ?? null;
    return sgdbCache[appid];
  } catch { sgdbCache[appid] = null; return null; }
}

async function handleImgError(img) {
  if (!img.src.includes('cdn.akamai') && img.dataset.triedCdn !== '1') {
    img.dataset.triedCdn = '1'; img.src = STEAM_IMG(img.dataset.appid); return;
  }
  if (img.dataset.triedSgdb !== '1') {
    img.dataset.triedSgdb = '1';
    const url = await obtenerImagenSGDB(img.dataset.appid);
    if (url) { img.src = url; return; }
  }
  img.parentElement.innerHTML = IMG_PH;
}

// ── FILTROS Y RENDER ──────────────────────────────────────────
function aplicarFiltros() {
  // Recalcular base solo si cambió el filtro
  base = filtro==='disponible' ? todos.filter(j=>j.disp)
       : filtro==='no-disp'    ? todos.filter(j=>!j.disp)
       : todos;
  filtrados = buscar(base, query);
  pagina = 0;
  document.getElementById('grid').innerHTML = '';
  actualizarCounter();
  renderPagina();
}

function actualizarCounter() {
  const el = document.getElementById('counter');
  if (!filtrados.length) { el.innerHTML = 'Sin resultados'; return; }
  const nd = filtrados.filter(j=>j.disp).length;
  el.innerHTML = `<span>${filtrados.length.toLocaleString()}</span> juego${filtrados.length!==1?'s':''} — <span>${nd.toLocaleString()}</span> disponibles · ${(filtrados.length-nd).toLocaleString()} no disponibles`;
}

function renderPagina() {
  const grid  = document.getElementById('grid');
  const chunk = filtrados.slice(pagina*PAGE_SIZE, (pagina+1)*PAGE_SIZE);
  if (!chunk.length && !pagina) { mostrarVacio('Sin resultados', 'Probá con otro término'); return; }

  // DocumentFragment — un solo reflow al insertar todo junto
  const frag = document.createDocumentFragment();
  chunk.forEach((j, idx) => {
    const card = document.createElement('div');
    card.className = `card ${j.disp?'disponible':'no-disp'}`;
    card.style.animationDelay = `${(idx%PAGE_SIZE)*8}ms`;
    card.innerHTML = `<div class="card-img"><img src="${j.imagen||STEAM_IMG(j.appid)}" alt="${esc(j.nombre)}" loading="lazy" data-appid="${j.appid}" data-tried-cdn="0" data-tried-sgdb="0" onerror="handleImgError(this)"/><div class="overlay"></div></div><div class="card-body"><div class="card-name" title="${esc(j.nombre)}">${esc(j.nombre)}</div><div class="card-footer"><span class="badge ${j.disp?'ok':'no'}">${j.disp?'✅ Disponible':'❌ No disponible'}</span><span class="appid-tag">#${j.appid}</span></div></div>`;
    frag.appendChild(card);
  });
  grid.appendChild(frag);
  pagina++;
}

// ── INFINITE SCROLL con IntersectionObserver ──────────────────
const sentinel = document.getElementById('sentinel');
const observer = new IntersectionObserver(entries => {
  if (!entries[0].isIntersecting || cargandoMas || pagina*PAGE_SIZE >= filtrados.length) return;
  cargandoMas = true;
  requestAnimationFrame(() => { renderPagina(); cargandoMas = false; });
}, { rootMargin: '400px' });
observer.observe(sentinel);

// Scroll top button
window.addEventListener('scroll', () => {
  const st = document.getElementById('scrollTop');
  window.scrollY > 400 ? st.classList.add('visible') : st.classList.remove('visible');
}, { passive: true });

// ── BUSCADOR ──────────────────────────────────────────────────
const inputEl  = document.getElementById('buscador');
const clearBtn = document.getElementById('clear-btn');
const hintEl   = document.getElementById('search-hint');

inputEl.addEventListener('input', e => {
  clearBtn.style.display = e.target.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    query = e.target.value;
    const hayQ = query.trim().length >= 2;
    if (hayQ) {
      const total = buscar(base, query).length;
      hintEl.textContent = `${total.toLocaleString()} resultado${total!==1?'s':''} encontrado${total!==1?'s':''}`;
      hintEl.className = 'search-hint found';
    } else {
      hintEl.textContent = 'Escribí para buscar en el catálogo';
      hintEl.className = 'search-hint';
    }
    aplicarFiltros();
  }, 220);
});

clearBtn.addEventListener('click', () => {
  inputEl.value=''; clearBtn.style.display='none';
  hintEl.textContent='Escribí para buscar en el catálogo';
  hintEl.className='search-hint'; query=''; aplicarFiltros();
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filtro = btn.dataset.filter;
  aplicarFiltros();
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function mostrarVacio(titulo, sub) {
  document.getElementById('grid').innerHTML = `<div class="state-msg"><div class="icon">🎮</div><h3>${titulo}</h3><p>${sub}</p></div>`;
  document.getElementById('counter').innerHTML = '';
}

cargar();
</script>
</body>
</html>
