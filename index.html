<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZonaSteam — Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #080c14;
      --surface:   #0d1220;
      --surface2:  #111827;
      --border:    #1e2d45;
      --accent:    #00c8ff;
      --accent2:   #0066ff;
      --danger:    #ff3a3a;
      --text:      #c9d6e8;
      --text-dim:  #4a5a72;
      --text-mute: #2a3a52;
      --glow:      rgba(0,200,255,0.12);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,102,255,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 30% at 90% 80%, rgba(0,200,255,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      padding: 48px 24px 36px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0,102,255,0.06) 0%, transparent 100%);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 24px rgba(0,200,255,0.3);
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: var(--text-dim);
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* SEARCH */
    .search-section {
      position: relative; z-index: 10;
      max-width: 640px;
      margin: 32px auto 0;
      padding: 0 20px;
    }

    .search-box { position: relative; }

    .search-box svg {
      position: absolute;
      left: 18px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    #buscador {
      width: 100%;
      padding: 14px 20px 14px 50px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #buscador:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,200,255,0.1);
    }

    #buscador::placeholder { color: var(--text-dim); }

    .search-hint {
      text-align: center;
      color: var(--text-mute);
      font-size: 0.76rem;
      margin-top: 10px;
      letter-spacing: 0.5px;
    }

    /* FILTERS */
    .filters {
      position: relative; z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 20px 0;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: rgba(0,200,255,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .counter {
      position: relative; z-index: 10;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.78rem;
      padding: 16px 20px 0;
      letter-spacing: 0.5px;
    }

    .counter span { color: var(--accent); font-weight: 500; }

    /* GRID */
    .grid-wrap {
      position: relative; z-index: 10;
      max-width: 1400px;
      margin: 24px auto 0;
      padding: 0 20px 60px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 16px;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.3s ease both;
    }

    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .card.disponible:hover { border-color: rgba(0,200,255,0.4); }
    .card.no-disponible:hover { border-color: rgba(255,58,58,0.3); }

    .card-img {
      position: relative;
      aspect-ratio: 460/215;
      overflow: hidden;
      background: var(--surface2);
    }

    .card-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .card:hover .card-img img { transform: scale(1.04); }

    .card-img .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(8,12,20,0.9) 100%);
    }

    .img-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px;
      color: var(--text-mute);
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-body { padding: 10px 12px 12px; }

    .card-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #dce8f5;
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.5em;
      letter-spacing: 0.3px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .badge.ok  { background: rgba(0,200,255,0.1); color: var(--accent); border: 1px solid rgba(0,200,255,0.2); }
    .badge.no  { background: rgba(255,58,58,0.08); color: #ff6060; border: 1px solid rgba(255,58,58,0.2); }

    .appid-tag { font-size: 0.65rem; color: var(--text-mute); font-family: monospace; }

    /* STATES */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .state-msg .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    .state-msg h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 8px; }
    .state-msg p { font-size: 0.82rem; color: var(--text-mute); }

    .loader {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 100px 20px; gap: 20px;
      color: var(--text-dim);
    }

    .spinner {
      width: 40px; height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loader-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      animation: pulse 1.5s ease infinite;
    }

    /* SCROLL TOP */
    #scrollTop {
      position: fixed;
      bottom: 28px; right: 28px;
      z-index: 100;
      width: 42px; height: 42px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0; transform: translateY(12px);
      transition: all 0.25s;
      color: var(--text-dim);
    }

    #scrollTop.visible { opacity: 1; transform: translateY(0); }
    #scrollTop:hover { border-color: var(--accent); color: var(--accent); }

    footer {
      position: relative; z-index: 10;
      text-align: center;
      padding: 0 20px 40px;
      color: var(--text-mute);
      font-size: 0.75rem;
      letter-spacing: 1px;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    @media (max-width: 480px) {
      #grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      header { padding: 32px 16px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎮</div>
    <h1>ZonaSteam</h1>
  </div>
  <p class="tagline">Catálogo de juegos · Steam</p>
  <div class="search-section">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="buscador" placeholder="Buscar por nombre de juego..." autocomplete="off" spellcheck="false"/>
    </div>
    <p class="search-hint">Escribí al menos 2 caracteres para buscar</p>
  </div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="disponible">✅ Disponibles</button>
  <button class="filter-btn" data-filter="no-disponible">❌ No disponibles</button>
</div>

<p class="counter" id="counter"></p>

<div class="grid-wrap">
  <div id="grid">
    <div class="loader">
      <div class="spinner"></div>
      <span class="loader-text">Cargando catálogo</span>
    </div>
  </div>
</div>

<footer>ZonaSteam © 2025 — Activación vía Steam</footer>

<button id="scrollTop" title="Volver arriba" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M18 15l-6-6-6 6"/>
  </svg>
</button>

<script>
  const PAGE_SIZE = 60;
  const STEAM_IMG = id => `https://cdn.akamai.steamstatic.com/steam/apps/${id}/header.jpg`;

  let todosJuegos  = [];
  let filtrados    = [];
  let paginaActual = 0;
  let filtroActivo = 'all';
  let queryActual  = '';
  let cargandoMas  = false;
  let searchTimer  = null;

  async function cargar() {
    try {
      let disponibles = [];
      try {
        const r = await fetch('catalogo.json?t=' + Date.now());
        if (r.ok) {
          const data = await r.json();
          disponibles = data.map(j => [j.appid ?? j[0], j.nombre ?? j.name ?? j[1], true]);
        }
      } catch(e) {}

      let noDisponibles = [];
      try {
        const r2 = await fetch('catalogo_comprimido.json?t=' + Date.now());
        if (r2.ok) {
          const data2 = await r2.json();
          noDisponibles = data2.map(j => [j[0], j[1], false]);
        }
      } catch(e) {}

      const appidsDisp = new Set(disponibles.map(j => j[0]));
      const noDispFilt = noDisponibles.filter(j => !appidsDisp.has(j[0]));
      todosJuegos = [...disponibles, ...noDispFilt];

      if (todosJuegos.length === 0) {
        mostrarVacio('No se encontró el catálogo', 'Asegurate de subir los archivos JSON a GitHub');
        return;
      }
      aplicarFiltros();
    } catch(e) {
      mostrarVacio('Error al cargar', 'No se pudo obtener el catálogo.');
    }
  }

  function aplicarFiltros() {
    const q = queryActual.toLowerCase().trim();
    filtrados = todosJuegos.filter(j => {
      const matchFiltro =
        filtroActivo === 'all'        ? true :
        filtroActivo === 'disponible' ? j[2] === true : j[2] === false;
      const matchQuery = q.length < 2 || j[1].toLowerCase().includes(q);
      return matchFiltro && matchQuery;
    });
    paginaActual = 0;
    document.getElementById('grid').innerHTML = '';
    actualizarCounter();
    renderPagina();
  }

  function actualizarCounter() {
    const disp   = filtrados.filter(j => j[2]).length;
    const noDisp = filtrados.filter(j => !j[2]).length;
    const el = document.getElementById('counter');
    if (filtrados.length === 0) { el.innerHTML = 'Sin resultados'; return; }
    el.innerHTML =
      `<span>${filtrados.length.toLocaleString()}</span> juego${filtrados.length !== 1 ? 's' : ''} — ` +
      `<span>${disp.toLocaleString()}</span> disponibles · ` +
      `${noDisp.toLocaleString()} no disponibles`;
  }

  function renderPagina() {
    const grid  = document.getElementById('grid');
    const desde = paginaActual * PAGE_SIZE;
    const hasta = Math.min(desde + PAGE_SIZE, filtrados.length);
    const chunk = filtrados.slice(desde, hasta);

    if (chunk.length === 0 && paginaActual === 0) {
      mostrarVacio('Sin resultados', 'Probá con otro nombre de juego');
      return;
    }

    chunk.forEach((j, idx) => {
      const [appid, nombre, disponible] = j;
      const card = document.createElement('div');
      card.className = `card ${disponible ? 'disponible' : 'no-disponible'}`;
      card.style.animationDelay = `${(idx % PAGE_SIZE) * 12}ms`;
      card.innerHTML = `
        <div class="card-img">
          <img src="${STEAM_IMG(appid)}" alt="${esc(nombre)}" loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><svg width=\\'28\\' height=\\'28\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'3\\'/><circle cx=\\'9\\' cy=\\'9\\' r=\\'2\\'/><path d=\\'m21 15-5-5L5 21\\'/></svg></div>'"/>
          <div class="overlay"></div>
        </div>
        <div class="card-body">
          <div class="card-name" title="${esc(nombre)}">${esc(nombre)}</div>
          <div class="card-footer">
            <span class="badge ${disponible ? 'ok' : 'no'}">${disponible ? '✅ Disponible' : '❌ No disponible'}</span>
            <span class="appid-tag">#${appid}</span>
          </div>
        </div>`;
      grid.appendChild(card);
    });
    paginaActual++;
  }

  window.addEventListener('scroll', () => {
    const st = document.getElementById('scrollTop');
    window.scrollY > 400 ? st.classList.add('visible') : st.classList.remove('visible');
    if (cargandoMas) return;
    if (paginaActual * PAGE_SIZE >= filtrados.length) return;
    if (window.scrollY + window.innerHeight > document.documentElement.scrollHeight - 600) {
      cargandoMas = true;
      setTimeout(() => { renderPagina(); cargandoMas = false; }, 80);
    }
  });

  document.getElementById('buscador').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { queryActual = e.target.value; aplicarFiltros(); }, 220);
  });

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroActivo = btn.dataset.filter;
    aplicarFiltros();
  });

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function mostrarVacio(titulo, sub) {
    document.getElementById('grid').innerHTML = `
      <div class="state-msg">
        <div class="icon">🎮</div>
        <h3>${titulo}</h3>
        <p>${sub}</p>
      </div>`;
    document.getElementById('counter').innerHTML = '';
  }

  cargar();
</script>
</body>
</html>
